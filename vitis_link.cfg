[connectivity]
# ──────────────────────────────────────────────────────────────
#  vitis_link.cfg  –  v++ Linker Configuration
#  Platform: xilinx_vck190_base_202410_1
# ──────────────────────────────────────────────────────────────

# Kernel instance
nk=mvdr_qr_top:1:mvdr_qr_top_0

# AXI Memory connections
# gmem0 -> X data     (DDR4)
# gmem1 -> a_s vector (DDR4)
# gmem2 -> w_out      (DDR4)
sc=mvdr_qr_top_0.gmem0:MC_NOC0
sc=mvdr_qr_top_0.gmem1:MC_NOC0
sc=mvdr_qr_top_0.gmem2:MC_NOC0

[advanced]
# Enable AIE-PL bridge if using AI Engines in future
# misc=solution_name:aie_pl_bridge
param=compiler.userPostSysLinkOverlayTcl=post_link.tcl

[profile]
data=mvdr_qr_top_0:X:all
data=mvdr_qr_top_0:w_out:all
